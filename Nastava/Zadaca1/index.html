<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moviemind</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
<a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M4 6l8-4 8 4v12l-8 4-8-4V6zm8 2L7 10v4l5 2.5L17 14v-4L12 8z"/></svg>
    </div>
    Moviemind
  </a>
  <nav class="d-none d-md-flex gap-1">
    <a href="#">Home</a>
    <a href="#">Novo</a>
    <a href="#">Popularno</a>
    <a href="#">Watchlist</a>
  </nav>
  <div class="search-wrap">
    <svg class="s-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search titles…" autocomplete="off"/>
  </div>
</header>
 
<!-- HERO -->
<section class="hero">
  <div class="hero-glow"></div>
  <h1>YOUR UNIVERSE OF<br/><em>ENTERTAINMENT</em></h1>
  <p>Movies, series, and games — all in one place. Explore thousands of titles across every genre.</p>
</section>
 
<!-- TABS -->
<div class="tabs-bar" id="tabsBar">
  <button class="tab-btn active" data-cat="movies">🎬 Filmovi <span class="tab-badge">20</span></button>
  <button class="tab-btn" data-cat="series">📺 Serije <span class="tab-badge">20</span></button>
  <button class="tab-btn" data-cat="games">🎮 Igre <span class="tab-badge">20</span></button>
</div>
 
<!-- CONTENT -->
<div class="section-wrap">
  <div class="sort-bar">
    <h2 id="sectionTitle">Movies <span id="itemCount"></span></h2>
    <select class="sort-select" id="sortSelect">
      <option value="default">Sortiraj: Poćetno</option>
      <option value="rating">Recenzija ↓</option>
      <option value="year">Godina ↓</option>
      <option value="az">A → Z</option>
    </select>
  </div>
  <div class="card-grid" id="cardGrid"></div>
</div>
 

<footer>
  <p>© 2026 <strong>Moviemind</strong>. Built for entertainment lovers worldwide.</p>
</footer>
 
<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-box" id="modalBox">
    <div class="modal-hero" id="modalHero"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-body-wrap">
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-info-grid" id="modalInfoGrid"></div>
      <div class="modal-actions">
        <button class="btn-watch">Gledaj sad!</button>
        <button class="btn-list">Dodaj na listu gledanja</button>
      </div>
    </div>
  </div>
</div>

<script src="index.js"></script>

</body>
</html>
